name: build-hunyuan

# Builda a imagem do worker Hunyuan3D 2.1 nos runners do GitHub (sem o limite de
# 30min do build GitHub-nativo do RunPod) e publica no GitHub Container Registry.
# Depois, no RunPod, usa-se "Deploy from a Docker image" apontando para:
#   ghcr.io/<owner>/3d-hunyuan:latest
#
# Dispara: manualmente (workflow_dispatch) ou em push que mexa no worker hunyuan.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docker/hunyuan/**"
      - ".github/workflows/build-hunyuan.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necessário para publicar no GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Libera espaço no runner (imagem CUDA é grande; runner padrão tem ~14GB
      # livres, insuficiente). Remove toolchains que não usamos.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Nome da imagem em minúsculas (GHCR exige). Ex.: ghcr.io/kleberklaar/3d-hunyuan
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/3d-hunyuan" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/hunyuan/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
          # Sem cache cross-run por simplicidade; o build leva ~30-45min aqui,
          # mas SEM limite de tempo (ao contrário do RunPod GitHub-nativo).

      - name: Done
        run: echo "Imagem publicada: ${{ steps.img.outputs.name }}:latest"
